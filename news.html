<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Новость | РАКУРС</title>
<meta name="description" content="Читайте последние новости на портале РАКУРС" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root {
    --bg-color: #1a1a1a;
    --text-color: #f0f0f0;
    --accent-color: #e09f7d;
    --card-bg: #222222;
    --border-color: #333333;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; padding-top: 60px; }
header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: rgba(26, 26, 26, 0.8); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
header .logo-container { display: flex; align-items: center; }
header .logo-container img { height:30px; margin-right: 10px; }
header h1 { color: var(--accent-color); font-weight: 700; letter-spacing: 1px; font-size: 28px; }
footer { margin-top: auto; padding: 20px; text-align: center; color: #888; font-size: 0.9rem; border-top:1px solid rgba(255, 255, 255, 0.1); }
.back-btn { display: block; padding: 10px 15px; max-width: 220px; width: 100%; box-sizing: border-box; background: transparent; border:2px solid var(--accent-color); color: var(--accent-color); text-decoration: none; font-weight: bold; border-radius:25px; transition: all 0.3s; margin: 30px auto 40px; text-align: center;}
.back-btn:hover { background: var(--accent-color); color: var(--bg-color); transform: scale(1.05); }
#article-container { max-width: 800px; margin:40px auto; padding: 30px; background: var(--card-bg); border-radius: 8px; border:1px solid var(--border-color); }
#article-container img { width: 100%; height: auto; max-height: 500px; object-fit: cover; border-radius:4px; margin-bottom: 25px; }
#article-container h1 { font-size: 2.2rem; margin-bottom: 20px; }
.meta-info { color: #aaa; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
.category-meta { color: var(--accent-color); font-weight: 700; }
.content-text { font-family: 'Merriweather', serif; font-size: 1.1rem; line-height: 1.7; white-space: pre-wrap; }
.video-container { position: relative; width:100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; background: #000; }
.video-container video { width: 100%; display: block; }
.play-button, .volume-button, .fullscreen-button { position: absolute; bottom: 10px; background: var(--card-bg); border-radius: 5px; border: 1px solid var(--accent-color); cursor: pointer; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; }
.play-button { left: 10px; }
.volume-button { left: 50px; }
.fullscreen-button { right: 10px; }
.play-icon, .volume-icon, .fullscreen-icon { width: 20px; height: 20px; }
.volume-slider { position: absolute; bottom: 50px; left: 50px; width: 100px; display: none; }
</style>
</head>
<body>
<header>
    <div class="logo-container">
        <img src="https://raw.github.com/rakurs-news/rakurs-news.github.io/main/images/IMG_20260706_221334.png" alt="Логотип">
        <h1>РАКУРС</h1>
    </div>
</header>
<main>
    <div id="article-container">
        <p style="text-align: center; color: #666;">Загрузка статьи...</p>
    </div>
</main>    
<footer><p>©2026 РАКУРС</p></footer>

<script>
async function loadSingleArticle() {
    const params = new URLSearchParams(window.location.search);
    const newsId = params.get('id');
    const container = document.getElementById('article-container');

    try {
        const response = await fetch('news.json');
        const data = await response.json();
        const news = data.find(n => n.id == newsId);

        if (news) {
            document.title = `${news.title} | РАКУРС`;

            let mediaHtml = news.videoUrl  
                ? `<div class="video-container" id="vid-wrapper">
                     <video src="${news.videoUrl}" playsinline></video>
                     <div class="play-button" id="play-btn"><div class="play-icon"></div></div>
                     <div class="volume-button" id="volume-btn"><img class="volume-icon" src="https://github.com/rakurs-news/rakurs-news.github.io/raw/main/images/IMG_20260712_040343.webp" alt="Громкость"></div>
                     <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.1" value="1">
                     <div class="fullscreen-button" id="fullscreen-btn"><img class="fullscreen-icon" src="https://github.com/rakurs-news/rakurs-news.github.io/raw/main/images/IMG_20260712_041022.webp" alt="Во весь экран"></div>
                   </div>`
                : `<img src="${news.image}" alt="${news.title}">`;

            container.innerHTML = `${mediaHtml}
                <h1>${news.title}</h1>
                <div class="meta-info"><span class="category-meta">Рубрика: ${news.category}</span></div>
                <div class="content-text">${news.content}</div>
                <a href="index.html" class="back-btn">← На Главную</a>`;

            const wrapper = document.getElementById('vid-wrapper');
            const video = wrapper ? wrapper.querySelector('video') : null;
            const playBtn = wrapper ? document.getElementById('play-btn') : null;
            const volumeBtn = wrapper ? document.getElementById('volume-btn') : null;
            const volumeSlider = wrapper ? document.getElementById('volume-slider') : null;
            const fullscreenBtn = wrapper ? document.getElementById('fullscreen-btn') : null;

            if (wrapper && video && playBtn && volumeBtn && volumeSlider && fullscreenBtn) {
                const toggleVideo = () => {
                    if (video.paused) {
                        video.play();
                        playBtn.style.display = 'none';
                    } else {
                        video.pause();
                        playBtn.style.display = 'flex';
                    }
                };

                playBtn.addEventListener('click', toggleVideo);
                
                volumeBtn.addEventListener('click', () => {
                    volumeSlider.style.display = volumeSlider.style.display === 'block' ? 'none' : 'block';
                });

                volumeSlider.addEventListener('input', () => {
                    video.volume = volumeSlider.value;
                });

                fullscreenBtn.addEventListener('click', () => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        wrapper.requestFullscreen();
                    }
                });

                wrapper.addEventListener('click', toggleVideo);
            }
        } else {
            container.innerHTML = `<h2>Новость не найдена</h2>`;
        }
    } catch (err) {
        console.error(err);
        container.innerHTML = `<h2>Ошибка загрузки</h2>`;
    }
}
loadSingleArticle();
</script>
</body>
</html>
